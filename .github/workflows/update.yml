name: Update Miku Goods News

on:
  push:                      # 처음 push하면 자동으로 1회 실행됨
    branches: [main]
  schedule:
    - cron: "0 */6 * * *"    # 6시간마다 (UTC)
  workflow_dispatch:          # 사이트의 "지금 업데이트" 버튼 / Actions 탭 수동 실행

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install feedparser requests

      - name: Fetch news
        run: python fetch_news.py

      - name: Commit & push
        run: |
          git config user.name "miku-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "update: goods news $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
